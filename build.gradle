tasks.register("verifyModuleBoundaries") {
    group = "verification"
    description = "Fails when a project dependency violates the approved module graph."

    doLast {
        allowedProjectDependencies.each { projectPath, allowedPaths ->
            def targetProject = rootProject.project(projectPath)
            def actualPaths = targetProject.configurations
                    .findAll { it.name in ["api", "implementation", "compileOnly"] }
                    .collectMany { configuration ->
                        configuration.dependencies.withType(ProjectDependency).collect {
                            it.path
                        }
                    }
                    .toSet()
            def forbiddenPaths = actualPaths - allowedPaths
            if (!forbiddenPaths.isEmpty()) {
                throw new GradleException(
                        "Module ${projectPath} has forbidden project dependencies: ${forbiddenPaths.sort()}"
                )
            }
        }
    }
}

tasks.named("check") {
    dependsOn tasks.named("verifyModuleBoundaries")
}
